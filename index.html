<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meu Pet</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(#8de0ff,#ffffff);
    text-align:center;
    overflow:hidden;
}

h1{
    margin-top:20px;
}

#game{
    margin-top:40px;
}

#caixa,#ovo{
    font-size:120px;
    cursor:pointer;
}

#caixa{
    animation:balanco 1s infinite;
}

@keyframes balanco{
    50%{
        transform:rotate(5deg);
    }
}

#ovo{
    display:none;
}

#cachorro{
    display:none;
    margin:auto;
    width:150px;
    height:120px;
    background:#c98b45;
    border-radius:70px 70px 40px 40px;
    position:relative;
}

#cachorro:before,
#cachorro:after{
    content:"";
    position:absolute;
    top:-20px;
    width:45px;
    height:60px;
    background:#8b5a2b;
    border-radius:50%;
}

#cachorro:before{
    left:10px;
}

#cachorro:after{
    right:10px;
}

.olho{
    width:15px;
    height:15px;
    background:black;
    border-radius:50%;
    position:absolute;
    top:45px;
}

.esq{
    left:35px;
}

.dir{
    right:35px;
}

#boca{
    position:absolute;
    bottom:25px;
    left:65px;
}

#gui{
    display:none;
}

button{
    padding:12px;
    margin:5px;
    border-radius:10px;
    border:0;
    font-size:17px;
}

#mensagem{
    font-size:20px;
    font-weight:bold;
}

video{
    margin-top:20px;
}

</style>

</head>

<body>

<h1>🐾 Meu Pet</h1>

<div id="game">

<div id="mensagem">
Uma caixa misteriosa apareceu...
</div>

<div id="caixa" onclick="abrirCaixa()">
📦
</div>


<div id="ovo" onclick="abrirOvo()">
🥚
</div>


<div id="cachorro">

<div class="olho esq"></div>
<div class="olho dir"></div>

<div id="boca">
👅
</div>

</div>


<div id="gui">

<h2>🐶 Byte</h2>

❤️ Felicidade: 100%

<br>

🍖 Fome: 100%

<br><br>


<button>
🍎 Alimentar
</button>

<button>
🎾 Brincar
</button>

<button onclick="abrirCamera()">
📷 Câmera
</button>


</div>

<button onclick="abrirCamera()">
📷 Câmera
</button>

</div>

</div>

</script>


</body>
</html>
